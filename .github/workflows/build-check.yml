name: Build Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  frontend-build:
    name: 前端编译检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: notex_frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: notex_frontend
        run: npm install

      - name: 构建前端项目
        working-directory: notex_frontend
        run: npm run build

  backend-build:
    name: 后端编译检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: 构建后端项目
        working-directory: notex_backend
        run: mvn -B clean package
